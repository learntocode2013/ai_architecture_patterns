version: '3.8'

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-gateway
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=REDACTED
      - GEMINI_API_KEY=REDACTED
      - GOOGLE_API_KEY=REDACTED
      - GEMINI_API_VERSION=v1beta
      - LITELLM_CACHE=true
      - LITELLM_CACHE_TYPE=redis-semantic
      - LITELLM_CACHE_EMBEDDING_MODEL=google/text-embedding-004
      - LITELLM_LOG=DEBUG
      - REDIS_HOST=redis-stack
      - REDIS_PORT=6379
      - REDIS_PASSWORD=dummy-password
    command: [ "--config", "/app/config.yaml", "--debug" ]
    depends_on:
      - redis-stack

  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-vector-cache
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI for inspecting cache hits
    environment:
      - REDIS_ARGS=--requirepass dummy-password